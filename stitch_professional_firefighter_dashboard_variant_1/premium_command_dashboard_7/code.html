<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ignis Floor Plan Editor - Building Digitization</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1a3d35",
                        "forest": "#1a3d35",
                        "cream": "#FDFBF7",
                        "accent-purple": "#a855f7",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        :root {
            --forest-color: #1a3d35;
            --cream-color: #FDFBF7;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FDFBF7;
        }
        .canvas-grid {
            background-image: radial-gradient(#1a3d35 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            background-color: #FDFBF7;
        }
        .route-line {
            stroke-dasharray: 8;
            filter: drop-shadow(0 0 4px rgba(168, 85, 247, 0.4));
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(26, 61, 53, 0.08);
        }
        .tool-btn-active {
            @apply bg-forest text-white shadow-lg;
        }
        .tool-btn {
            @apply flex flex-col items-center justify-center p-3 rounded-xl text-forest/60 hover:bg-forest/5 transition-all;
        }
    </style>
</head>
<body class="bg-cream font-display text-slate-900 min-h-screen flex overflow-hidden">
<aside class="w-20 border-r border-forest/10 flex flex-col items-center py-6 bg-white z-20">
<div class="bg-forest size-10 rounded-lg flex items-center justify-center text-white mb-10">
<span class="material-symbols-outlined">local_fire_department</span>
</div>
<div class="flex flex-col gap-4 flex-1">
<button class="tool-btn tool-btn-active">
<span class="material-symbols-outlined">edit_square</span>
<span class="text-[10px] font-bold mt-1">Wall</span>
</button>
<button class="tool-btn">
<span class="material-symbols-outlined">door_front</span>
<span class="text-[10px] font-bold mt-1">Door</span>
</button>
<button class="tool-btn">
<span class="material-symbols-outlined">sensors</span>
<span class="text-[10px] font-bold mt-1">Sensor</span>
</button>
<button class="tool-btn">
<span class="material-symbols-outlined">straighten</span>
<span class="text-[10px] font-bold mt-1">Scale</span>
</button>
<button class="tool-btn">
<span class="material-symbols-outlined">hub</span>
<span class="text-[10px] font-bold mt-1">Node</span>
</button>
</div>
<div class="mt-auto flex flex-col gap-4">
<button class="tool-btn">
<span class="material-symbols-outlined">undo</span>
</button>
<button class="tool-btn">
<span class="material-symbols-outlined">redo</span>
</button>
</div>
</aside>
<main class="flex-1 flex flex-col h-screen relative">
<header class="flex items-center justify-between border-b border-forest/5 bg-white px-8 py-3 sticky top-0 z-10">
<div class="flex items-center gap-6">
<div>
<h1 class="text-forest text-sm font-bold leading-tight">Ignis Floor Plan Editor</h1>
<p class="text-forest/40 text-[10px] font-medium uppercase tracking-widest">Building Digitization Tool</p>
</div>
<div class="h-6 w-[1px] bg-forest/10"></div>
<div class="flex items-center gap-2 bg-forest/5 p-1 rounded-lg">
<button class="px-4 py-1.5 rounded-md text-xs font-bold bg-white text-forest shadow-sm">Level 01</button>
<button class="px-4 py-1.5 rounded-md text-xs font-bold text-forest/50 hover:text-forest">Level 02</button>
<button class="size-7 flex items-center justify-center text-forest/40 hover:text-forest">
<span class="material-symbols-outlined text-sm">add</span>
</button>
</div>
</div>
<div class="flex items-center gap-3">
<button class="px-5 py-2 text-xs font-bold text-forest hover:bg-forest/5 rounded-lg flex items-center gap-2 transition-all">
<span class="material-symbols-outlined text-sm">visibility</span>
                    Preview
                </button>
<button class="px-5 py-2 text-xs font-bold text-forest border border-forest/20 hover:border-forest rounded-lg flex items-center gap-2 transition-all">
<span class="material-symbols-outlined text-sm">data_object</span>
                    Export GeoJSON
                </button>
<button class="px-5 py-2 text-xs font-bold bg-forest text-white rounded-lg flex items-center gap-2 hover:bg-forest/90 transition-all shadow-lg shadow-forest/10">
<span class="material-symbols-outlined text-sm">route</span>
                    Calculate Routing
                </button>
</div>
</header>
<div class="flex-1 overflow-hidden relative canvas-grid flex items-center justify-center">
<div class="w-[90%] h-[80%] bg-white rounded-xl shadow-2xl border border-forest/10 relative overflow-hidden flex items-center justify-center">
<svg class="w-full h-full" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
<rect fill="none" height="500" stroke="#1a3d35" stroke-width="4" width="800" x="200" y="150"></rect>
<line stroke="#1a3d35" stroke-width="3" x1="500" x2="500" y1="150" y2="400"></line>
<line stroke="#1a3d35" stroke-width="3" x1="200" x2="1000" y1="400" y2="400"></line>
<line stroke="#1a3d35" stroke-width="3" x1="750" x2="750" y1="400" y2="650"></line>
<text fill="#1a3d35" font-family="Inter" font-size="12" font-weight="600" text-anchor="middle" x="350" y="275">OFFICE A-102</text>
<text fill="#1a3d35" font-family="Inter" font-size="12" font-weight="600" text-anchor="middle" x="750" y="275">CONFERENCE ROOM</text>
<text fill="#1a3d35" font-family="Inter" font-size="12" font-weight="600" text-anchor="middle" x="475" y="525">LOBBY / RECEPTION</text>
<text fill="#1a3d35" font-family="Inter" font-size="12" font-weight="600" text-anchor="middle" x="875" y="525">MECHANICAL</text>
<path class="route-line" d="M 350 275 L 475 275 L 475 525 L 875 525" fill="none" stroke="#a855f7" stroke-dasharray="10,6" stroke-width="2.5"></path>
<circle cx="350" cy="275" fill="#a855f7" r="4"></circle>
<circle cx="875" cy="525" fill="#a855f7" r="4"></circle>
<polygon fill="#a855f7" points="415,270 425,275 415,280"></polygon>
<polygon fill="#a855f7" points="470,390 475,400 480,390"></polygon>
<polygon fill="#a855f7" points="675,520 685,525 675,530"></polygon>
<circle cx="250" cy="200" fill="#1a3d35" fill-opacity="0.1" r="8" stroke="#1a3d35" stroke-width="1"></circle>
<text fill="#1a3d35" font-family="Material Symbols Outlined" font-size="10" text-anchor="middle" x="250" y="203">sensors</text>
<circle cx="950" cy="200" fill="#1a3d35" fill-opacity="0.1" r="8" stroke="#1a3d35" stroke-width="1"></circle>
<text fill="#1a3d35" font-family="Material Symbols Outlined" font-size="10" text-anchor="middle" x="950" y="203">sensors</text>
</svg>
<div class="absolute bottom-6 left-6 flex items-center gap-1 bg-white/90 border border-forest/10 p-1.5 rounded-lg shadow-xl backdrop-blur">
<button class="p-2 hover:bg-forest/5 rounded text-forest">
<span class="material-symbols-outlined text-sm">remove</span>
</button>
<span class="text-xs font-bold text-forest px-3">100%</span>
<button class="p-2 hover:bg-forest/5 rounded text-forest">
<span class="material-symbols-outlined text-sm">add</span>
</button>
</div>
</div>
</div>
</main>
<aside class="w-80 border-l border-forest/10 bg-white flex flex-col z-20">
<div class="p-6 border-b border-forest/5">
<h3 class="text-xs font-bold text-forest/40 uppercase tracking-widest mb-4">Building Preview</h3>
<div class="aspect-square w-full bg-forest/5 rounded-xl border border-forest/10 overflow-hidden relative">
<div class="absolute inset-4 bg-white/50 border border-forest/10 rounded"></div>
<div class="absolute inset-0 flex items-center justify-center opacity-20 pointer-events-none">
<span class="material-symbols-outlined text-6xl text-forest">apartment</span>
</div>
<div class="absolute top-1/4 left-1/4 w-1/2 h-1/2 border-2 border-forest/30 bg-forest/5"></div>
</div>
<div class="mt-4 flex items-center justify-between">
<span class="text-[10px] font-bold text-forest/50">SECTOR 04 - NORTH WING</span>
<span class="text-[10px] font-bold text-green-600 flex items-center gap-1">
<span class="size-1.5 rounded-full bg-green-500"></span> SYNCED
                </span>
</div>
</div>
<div class="flex-1 p-6 overflow-y-auto">
<h3 class="text-xs font-bold text-forest/40 uppercase tracking-widest mb-6">Object Properties</h3>
<div class="space-y-6">
<div>
<label class="block text-[11px] font-bold text-forest/60 uppercase mb-2">Room Name</label>
<input class="w-full bg-forest/5 border border-forest/10 rounded-lg px-4 py-2 text-sm font-medium focus:ring-1 focus:ring-forest focus:border-forest outline-none transition-all" type="text" value="CONFERENCE ROOM"/>
</div>
<div class="grid grid-cols-2 gap-4">
<div>
<label class="block text-[11px] font-bold text-forest/60 uppercase mb-2">Area m²</label>
<input class="w-full bg-forest/5 border border-forest/10 rounded-lg px-4 py-2 text-sm font-medium outline-none" type="text" value="48.5"/>
</div>
<div>
<label class="block text-[11px] font-bold text-forest/60 uppercase mb-2">Level</label>
<select class="w-full bg-forest/5 border border-forest/10 rounded-lg px-4 py-2 text-sm font-medium outline-none appearance-none">
<option>L01</option>
<option>L02</option>
</select>
</div>
</div>
<div>
<label class="block text-[11px] font-bold text-forest/60 uppercase mb-2">Sensor Type</label>
<div class="space-y-2">
<label class="flex items-center gap-3 p-3 bg-forest/5 border border-forest/10 rounded-xl cursor-pointer hover:border-forest/30 transition-all">
<input checked="" class="text-forest focus:ring-forest" name="sensor" type="radio"/>
<span class="text-sm font-medium text-forest">Smoke Detector (Type A)</span>
</label>
<label class="flex items-center gap-3 p-3 border border-forest/10 rounded-xl cursor-pointer hover:border-forest/30 transition-all">
<input class="text-forest focus:ring-forest" name="sensor" type="radio"/>
<span class="text-sm font-medium text-forest/60">Heat Sensor (Type B)</span>
</label>
</div>
</div>
<div class="pt-6 border-t border-forest/5">
<button class="w-full py-3 border border-red-200 text-red-600 text-xs font-bold rounded-xl hover:bg-red-50 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-sm">delete</span>
                        Delete Object
                    </button>
</div>
</div>
</div>
<div class="p-6 bg-forest/5 border-t border-forest/10">
<div class="flex items-center gap-3">
<div class="size-8 rounded-full bg-forest/10 overflow-hidden bg-cover bg-center border border-forest/10" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDYwHwatBMJN7L7Ex9_wnI9MNJUJ8DifHxQWz-D41QCD-eE33Y0p0jFAN1CJRFGJgZNtpac_Q_YvNSn7BxK3MIRmqzSjC-0YAej6R82pOmgTKNrtY_xj6ANEJyFLXescunqtcM5NAZrxn3swxS51cxqkR63CIB4Kbz7rxtLOBTEs_uBnYwecHpJdRE4oeHEpivR2eYtDG6mAdjo5QCcJaYyOPuVSk5U4wF36HRFYFYIauP5-HQD-g6dolo9d9ArjUsJbAzIsAJwIzY')"></div>
<div class="flex-1">
<p class="text-[11px] font-bold text-forest">Cmdr. Sterling</p>
<p class="text-[9px] uppercase font-bold text-forest/40">Editing Mode</p>
</div>
<button class="size-8 flex items-center justify-center rounded-lg hover:bg-forest/10 text-forest/40 transition-all">
<span class="material-symbols-outlined text-lg">settings</span>
</button>
</div>
</div>
</aside>

</body></html>
