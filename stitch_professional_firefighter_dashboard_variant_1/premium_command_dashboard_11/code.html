<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Elite Floor Plan Editor v2 - Ignis System</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=JetBrains+Mono:wght@400;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-25..0" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "forest": "#1a3d35",
                        "cream": "#FDFBF7",
                        "accent-purple": "#a855f7",
                    },
                    fontFamily: {
                        "sans": ["Inter", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"],
                    },
                    boxShadow: {
                        'deep': '0 20px 50px -12px rgba(26, 61, 53, 0.15)',
                        'inner-soft': 'inset 0 2px 4px 0 rgba(0, 0, 0, 0.05)',
                    }
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        :root {
            --forest-color: #1a3d35;
            --cream-color: #FDFBF7;
            --grid-color: rgba(26, 61, 53, 0.12);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--cream-color);
        }
        .canvas-grid {
            background-color: #fcfcf9;
            background-image: radial-gradient(var(--grid-color) 0.8px, transparent 0.8px);
            background-size: 24px 24px;
        }
        .route-line {
            stroke-dasharray: 8;
            filter: drop-shadow(0 0 4px rgba(168, 85, 247, 0.6));
        }
        .tool-btn-active {
            @apply bg-forest text-white shadow-lg shadow-forest/20 ring-1 ring-forest/10;
        }
        .tool-btn {
            @apply flex flex-col items-center justify-center p-3 rounded-xl text-forest/50 hover:text-forest hover:bg-forest/5 transition-all duration-200;
        }
        .btn-3d {
            box-shadow: 0 4px 0 0 #0d1f1b, 0 8px 15px -4px rgba(26, 61, 53, 0.3);
            transition: all 0.1s ease;
        }
        .btn-3d:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 0 #0d1f1b, 0 4px 10px -4px rgba(26, 61, 53, 0.3);
        }
        .material-symbols-outlined {
            font-variation-settings: 'wght' 250, 'opsz' 20;
        }
    </style>
</head>
<body class="bg-cream text-slate-900 min-h-screen flex overflow-hidden">
<aside class="w-20 border-r border-forest/10 flex flex-col items-center py-6 bg-white z-30">
<div class="bg-forest size-11 rounded-xl flex items-center justify-center text-white mb-10 shadow-lg shadow-forest/20">
<span class="material-symbols-outlined text-2xl">local_fire_department</span>
</div>
<div class="flex flex-col gap-3 flex-1">
<button class="tool-btn tool-btn-active">
<span class="material-symbols-outlined">edit_square</span>
<span class="text-[9px] font-semibold mt-1.5 uppercase tracking-tighter">Wall</span>
</button>
<button class="tool-btn">
<span class="material-symbols-outlined">door_open</span>
<span class="text-[9px] font-semibold mt-1.5 uppercase tracking-tighter">Door</span>
</button>
<button class="tool-btn">
<span class="material-symbols-outlined">sensors</span>
<span class="text-[9px] font-semibold mt-1.5 uppercase tracking-tighter">Sensor</span>
</button>
<button class="tool-btn">
<span class="material-symbols-outlined">straighten</span>
<span class="text-[9px] font-semibold mt-1.5 uppercase tracking-tighter">Scale</span>
</button>
<button class="tool-btn">
<span class="material-symbols-outlined">account_tree</span>
<span class="text-[9px] font-semibold mt-1.5 uppercase tracking-tighter">Node</span>
</button>
</div>
<div class="mt-auto flex flex-col gap-2">
<button class="tool-btn !p-2 opacity-50 hover:opacity-100">
<span class="material-symbols-outlined">help</span>
</button>
</div>
</aside>
<main class="flex-1 flex flex-col h-screen relative">
<header class="flex items-center justify-between border-b border-forest/5 bg-white/80 backdrop-blur-md px-8 py-3.5 sticky top-0 z-20">
<div class="flex items-center gap-8">
<div>
<h1 class="text-forest text-sm font-bold tracking-tight">Elite Floor Plan Editor v2</h1>
<p class="text-forest/40 text-[9px] font-bold uppercase tracking-[0.2em]">Ignis Safety Systems</p>
</div>
<div class="flex items-center gap-1 bg-forest/5 p-1 rounded-xl border border-forest/5">
<button class="px-5 py-1.5 rounded-lg text-xs font-semibold bg-white text-forest shadow-sm ring-1 ring-black/5">Level 01</button>
<button class="px-5 py-1.5 rounded-lg text-xs font-semibold text-forest/50 hover:text-forest transition-colors">Level 02</button>
<button class="px-2 py-1.5 rounded-lg text-forest/30 hover:text-forest">
<span class="material-symbols-outlined text-sm">add</span>
</button>
</div>
</div>
<div class="flex items-center gap-3">
<button class="px-5 py-2 text-xs font-bold text-forest hover:bg-forest/5 rounded-xl flex items-center gap-2 transition-all">
<span class="material-symbols-outlined text-lg">visibility</span>
                    Preview
                </button>
<button class="px-5 py-2 text-xs font-bold text-forest border border-forest/10 bg-white hover:bg-forest/5 rounded-xl flex items-center gap-2 transition-all">
<span class="material-symbols-outlined text-lg">terminal</span>
                    GeoJSON
                </button>
<button class="btn-3d px-6 py-2 text-xs font-bold bg-forest text-white rounded-xl flex items-center gap-2">
<span class="material-symbols-outlined text-lg">route</span>
                    Calculate Routing
                </button>
</div>
</header>
<div class="flex-1 overflow-hidden relative canvas-grid flex items-center justify-center p-12">
<div class="w-full h-full bg-white rounded-2xl shadow-deep border border-forest/5 relative overflow-hidden flex items-center justify-center">
<svg class="w-full h-full" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
<rect fill="none" height="500" stroke="#1a3d35" stroke-width="3" width="800" x="200" y="150"></rect>
<line stroke="#1a3d35" stroke-width="2.5" x1="500" x2="500" y1="150" y2="400"></line>
<line stroke="#1a3d35" stroke-width="2.5" x1="200" x2="1000" y1="400" y2="400"></line>
<line stroke="#1a3d35" stroke-width="2.5" x1="750" x2="750" y1="400" y2="650"></line>
<text fill="#1a3d35" font-family="Inter" font-size="11" font-weight="600" text-anchor="middle" x="350" y="275">OFFICE A-102</text>
<text fill="#1a3d35" font-family="Inter" font-size="11" font-weight="600" text-anchor="middle" x="750" y="275">CONFERENCE ROOM</text>
<text fill="#1a3d35" font-family="Inter" font-size="11" font-weight="600" text-anchor="middle" x="475" y="525">LOBBY / RECEPTION</text>
<text fill="#1a3d35" font-family="Inter" font-size="11" font-weight="600" text-anchor="middle" x="875" y="525">MECHANICAL</text>
<path class="route-line" d="M 350 275 L 475 275 L 475 525 L 875 525" fill="none" stroke="#a855f7" stroke-dasharray="8,6" stroke-width="3"></path>
<circle cx="350" cy="275" fill="#a855f7" r="5"></circle>
<circle cx="875" cy="525" fill="#a855f7" r="5"></circle>
<polygon fill="#a855f7" points="415,270 428,275 415,280"></polygon>
<polygon fill="#a855f7" points="470,390 475,405 480,390"></polygon>
<polygon fill="#a855f7" points="675,520 688,525 675,530"></polygon>
<g opacity="0.8">
<circle cx="250" cy="200" fill="#1a3d35" r="9" stroke="#1a3d35" stroke-width="1"></circle>
<text fill="white" font-family="Material Symbols Outlined" font-size="10" text-anchor="middle" x="250" y="204">sensors</text>
<circle cx="950" cy="200" fill="#1a3d35" r="9" stroke="#1a3d35" stroke-width="1"></circle>
<text fill="white" font-family="Material Symbols Outlined" font-size="10" text-anchor="middle" x="950" y="204">sensors</text>
</g>
</svg>
<div class="absolute bottom-8 right-8 flex items-center gap-1 bg-white/95 border border-forest/10 p-1.5 rounded-xl shadow-2xl backdrop-blur-md">
<button class="p-2 hover:bg-forest/5 rounded-lg text-forest transition-colors">
<span class="material-symbols-outlined text-lg">remove</span>
</button>
<span class="text-[11px] font-mono font-bold text-forest px-4">100%</span>
<button class="p-2 hover:bg-forest/5 rounded-lg text-forest transition-colors">
<span class="material-symbols-outlined text-lg">add</span>
</button>
</div>
</div>
<div class="absolute bottom-8 left-8 flex items-center gap-2">
<button class="size-10 bg-white border border-forest/10 rounded-xl shadow-lg flex items-center justify-center text-forest/60 hover:text-forest transition-all">
<span class="material-symbols-outlined">undo</span>
</button>
<button class="size-10 bg-white border border-forest/10 rounded-xl shadow-lg flex items-center justify-center text-forest/60 hover:text-forest transition-all">
<span class="material-symbols-outlined">redo</span>
</button>
</div>
</div>
</main>
<aside class="w-85 border-l border-forest/10 bg-white flex flex-col z-30 shadow-[-10px_0_30px_-15px_rgba(0,0,0,0.05)]">
<div class="p-6">
<div class="rounded-2xl border border-forest/10 bg-forest/[0.02] p-4 shadow-sm">
<h3 class="text-[10px] font-bold text-forest/40 uppercase tracking-widest mb-4">Building Preview</h3>
<div class="aspect-video w-full bg-forest/5 rounded-xl border border-forest/10 overflow-hidden relative group">
<div class="absolute inset-0 canvas-grid opacity-30"></div>
<div class="absolute inset-0 flex items-center justify-center">
<span class="material-symbols-outlined text-5xl text-forest/10 group-hover:scale-110 transition-transform">domain</span>
</div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-1/3 h-1/3 border-2 border-forest/40 bg-forest/10 rounded-sm"></div>
</div>
<div class="mt-4 flex items-center justify-between">
<span class="text-[10px] font-bold text-forest/70 font-mono">SEC-04-NW</span>
<span class="text-[10px] font-bold text-emerald-600 flex items-center gap-1.5">
<span class="size-2 rounded-full bg-emerald-500 animate-pulse"></span> LIVE SYNC
                    </span>
</div>
</div>
</div>
<div class="flex-1 px-6 overflow-y-auto">
<div class="rounded-2xl border border-forest/10 bg-white p-5 shadow-sm space-y-6">
<h3 class="text-[10px] font-bold text-forest/40 uppercase tracking-widest">Object Properties</h3>
<div class="space-y-5">
<div>
<label class="block text-[10px] font-bold text-forest/50 uppercase mb-2 tracking-wide">Room Name</label>
<input class="w-full bg-forest/5 border border-forest/10 rounded-xl px-4 py-2.5 text-sm font-medium focus:ring-2 focus:ring-forest/20 focus:border-forest outline-none transition-all" type="text" value="CONFERENCE ROOM"/>
</div>
<div class="grid grid-cols-2 gap-4">
<div>
<label class="block text-[10px] font-bold text-forest/50 uppercase mb-2 tracking-wide">Area m²</label>
<input class="w-full bg-forest/5 border border-forest/10 rounded-xl px-4 py-2.5 text-sm font-mono font-bold text-forest outline-none" type="text" value="48.50"/>
</div>
<div>
<label class="block text-[10px] font-bold text-forest/50 uppercase mb-2 tracking-wide">Level</label>
<div class="relative">
<select class="w-full bg-forest/5 border border-forest/10 rounded-xl px-4 py-2.5 text-sm font-bold text-forest outline-none appearance-none">
<option>L01</option>
<option>L02</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-sm pointer-events-none">expand_more</span>
</div>
</div>
</div>
<div>
<label class="block text-[10px] font-bold text-forest/50 uppercase mb-2 tracking-wide">Sensor Configuration</label>
<div class="space-y-2">
<label class="flex items-center gap-3 p-3 bg-forest/5 border border-forest/20 rounded-xl cursor-pointer hover:border-forest/40 transition-all group">
<input checked="" class="text-forest focus:ring-forest rounded-full border-forest/20" name="sensor" type="radio"/>
<span class="text-xs font-semibold text-forest">Smoke Detector (Type-A)</span>
</label>
<label class="flex items-center gap-3 p-3 border border-forest/10 rounded-xl cursor-pointer hover:bg-forest/[0.02] transition-all group">
<input class="text-forest focus:ring-forest rounded-full border-forest/20" name="sensor" type="radio"/>
<span class="text-xs font-semibold text-forest/50 group-hover:text-forest">Heat Sensor (Type-B)</span>
</label>
</div>
</div>
<div class="pt-2">
<button class="w-full py-2.5 border border-red-100 text-red-500 text-[10px] font-bold uppercase tracking-widest rounded-xl hover:bg-red-50 hover:border-red-200 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-lg">delete_sweep</span>
                            Delete Object
                        </button>
</div>
</div>
</div>
</div>
<div class="p-6 bg-forest/[0.02] border-t border-forest/10">
<div class="flex items-center gap-4">
<div class="relative">
<div class="size-10 rounded-xl bg-forest/10 overflow-hidden bg-cover bg-center border border-forest/20 shadow-sm" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCZLTyDeguYWpb-hn3dH71w8PNvnXXF6DscTvYlgG-aRJg2ZP6bsgUz0nx6rEx_kXPjzPlJ9Qf4OC_DW5NPYkuqieZHE8xoLRvplp25nHt8CCbGpsLeqM8PjTLwC3kNGD_Q1cC8x7K5XC6wCmzJ2OYqowUPL3aflk2EdT85shYLZ-x07TWGiWlW1B996NsXYmrnvMqXNxtUdxayr7SQ4ZKmcUlb-PW1xUGgQob8r3xNTkbIfA-oJ9s2i910SNDjPnm89sZpUrbtKsA')"></div>
<div class="absolute -bottom-1 -right-1 size-3.5 bg-emerald-500 border-2 border-white rounded-full"></div>
</div>
<div class="flex-1 min-w-0">
<p class="text-xs font-bold text-forest truncate">Cmdr. Sterling</p>
<div class="flex items-center gap-1.5 mt-0.5">
<span class="text-[9px] uppercase font-black text-forest/40 tracking-wider">Editing Mode</span>
</div>
</div>
<button class="size-9 flex items-center justify-center rounded-xl hover:bg-forest/10 text-forest/40 hover:text-forest transition-all border border-transparent hover:border-forest/10">
<span class="material-symbols-outlined text-xl">settings</span>
</button>
</div>
</div>
</aside>

</body></html>
